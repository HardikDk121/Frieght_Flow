name: freight_flow
description: FreightFlow - End-to-End Transport Management & Digital Ledger System
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.19.0
  equatable: ^2.0.5
  google_fonts: ^6.2.1
  # Feature 2: Live Tracking (GPS capture on state transitions)
  geolocator: ^13.0.2
  # Feature 3: UI Polish
  shimmer: ^3.0.0
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  google_maps_flutter: ^2.17.0
  # ── Firebase / Maps ────────────────────────────────────────────────────────
  # Uncomment AFTER completing FIREBASE_SETUP.md steps 1-4:
  # firebase_core: ^3.6.0
  # cloud_firestore: ^5.4.4
  # google_maps_flutter: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/calculator.png
    - assets/challan.png
    - assets/bill.png
    - assets/delivery.png
    - assets/icons/app_icon.png
    - assets/icons/foreground.png
    - assets/icons/background.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_foreground: "assets/icons/foreground.png"
  adaptive_icon_background: "assets/icons/background.png"
  min_sdk_android: 21
